[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "libscout-scraper"
version = "0.1.0"
description = "LibScout GitHub scraper service for usage indexing."
requires-python = ">=3.11"
license = "MIT"
authors = [{ name = "LibScout Team" }]
dependencies = [
  "selenium>=4.21.0",
  "httpx>=0.27.0",
  "python-dotenv>=1.0.1",
  "fastapi>=0.111.0",
  "uvicorn[standard]>=0.30.0",
]
