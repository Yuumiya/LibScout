[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "libscout-parser"
version = "0.1.0"
description = "LibScout tree-sitter CST parser with automatic language detection."
requires-python = ">=3.11"
license = "MIT"
authors = [{ name = "LibScout Team" }]
dependencies = [
  "tree-sitter>=0.25.0",
  "tree-sitter-language-pack>=1.4.0",
]
